---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-html
  namespace: dev
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>IoT App</title></head>
    <body>
      <h1>Version 1</h1>
      <p>Status: OK</p>
      <pre>{"status":"ok", "message": "v1"}</pre>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev
  labels:
    app: wil-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil-playground
  template:
    metadata:
      labels:
        app: wil-playground
        version: v1
    spec:
      containers:
      - name: nginx
        # nginx supports ARM64 natively
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8888
          name: http
          protocol: TCP
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: html
        configMap:
          name: app-html
      - name: nginx-config
        configMap:
          name: nginx-port-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-port-config
  namespace: dev
data:
  default.conf: |
    server {
        listen 8888;
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }
    }
